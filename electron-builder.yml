appId: com.cadanraw.app
productName: Cadanraw
directories:
  output: dist-app
  buildResources: assets
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
# better-sqlite3 ships a native .node binary that must live outside the asar.
asarUnpack:
  - "**/*.node"
mac:
  icon: assets/icon.icns
  category: public.app-category.productivity
  sign: scripts/ad-hoc-sign-mac.cjs
  target:
    - dmg
win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
