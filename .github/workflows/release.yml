name: Release desktop builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-13
            command: npx electron-builder --mac --publish never
            artifact: cadanraw-macos
            paths: |
              dist-app/*.dmg
          - name: Windows
            os: windows-latest
            command: npx electron-builder --win --x64 --publish never
            artifact: cadanraw-windows
            paths: |
              dist-app/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Electron main process
        run: npm run build:electron

      - name: Package ${{ matrix.name }}
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload ${{ matrix.name }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          fi

          shopt -s globstar nullglob
          files=()
          for file in release-assets/**; do
            if [ -f "$file" ]; then
              files+=("$file")
            fi
          done

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found."
            exit 1
          fi

          notes="Unsigned Cadanraw desktop builds for macOS and Windows. macOS may require right-click Open; Windows may show SmartScreen on first launch."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "Cadanraw $tag" --notes "$notes"
          fi
